{% extends "base.html" %}
{% block title %}Asset Dashboard{% endblock %}
{% block content %}
<div x-data="galleryApp()" 
     @close-panels.window="selectedPhoto = null; lightboxOpen = false"
     class="dashboard-layout" 
     style="display: flex; height: calc(100vh - 65px); overflow: hidden; position: relative; margin: -30px -22px -60px;">
  
  <!-- Main Gallery Area -->
  <main class="dashboard-main" style="flex: 1; overflow-y: auto; padding: 22px; position: relative;">
    <section class="page-title" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
      <h1 style="margin: 0;">Library</h1>
      <div style="display: flex; gap: 10px;">
        <!-- Bulk Selection Actions -->
        <template x-if="$store.selection.count > 0">
          <div style="display: flex; align-items: center; gap: 10px; background: var(--panel); padding: 5px 15px; border-radius: 6px; border: 1px solid var(--line); animation: fadeIn 0.2s;">
            <span x-text="$store.selection.count + ' selected'" style="font-weight: 600;"></span>
            <button class="button small secondary" title="Batch Edit (Not Implemented Yet)">Batch Edit</button>
            <button class="button small danger" title="Delete Selected">Delete</button>
            <button @click="$store.selection.clear()" class="link-button" style="padding: 0 10px;">Clear</button>
          </div>
        </template>
        
        <label class="button primary" style="cursor: pointer;">
          <svg style="width: 18px; height: 18px; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Upload
          <input type="file" multiple accept="image/*" style="display: none;" @change="handleFiles($event.target.files)">
        </label>
      </div>
    </section>

    <!-- Global Dropzone Overlay -->
    <div x-show="isDragging" 
         @dragover.prevent="isDragging = true"
         @dragleave.prevent="isDragging = false"
         @drop.prevent="handleDrop($event)"
         style="position: absolute; inset: 0; background: rgba(31,122,99,0.1); border: 3px dashed var(--accent); z-index: 50; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px);">
      <h2 style="color: var(--accent); font-size: 2rem;">Drop files or folders to upload</h2>
    </div>

    <!-- Filters -->
    <form class="filters" method="get" style="margin-bottom: 1.5rem;">
      <input name="q" placeholder="Search filename, metadata..." value="{{ filters.query }}" style="flex: 1;">
      <select name="sort" style="width: auto;">
        <option value="newest" {% if filters.sort == "newest" %}selected{% endif %}>Newest</option>
        <option value="oldest" {% if filters.sort == "oldest" %}selected{% endif %}>Oldest</option>
      </select>
      <button class="button small" type="submit">Filter</button>
    </form>

    <!-- Masonry Grid -->
    <section class="masonry-grid" id="photo-grid" @dragover.prevent="isDragging = true">
      {% for photo in pagination.items %}
        <article class="masonry-item" 
                 :class="{ 'selected': $store.selection.has({{ photo.id }}) }"
                 data-id="{{ photo.id }}">
                 
          <input type="checkbox" class="select-checkbox" 
                 :checked="$store.selection.has({{ photo.id }})"
                 @click.stop="$store.selection.toggle({{ photo.id }}, $event)">
                 
          <!-- Image opens Lightbox -->
          <img loading="lazy" src="{{ url_for('photos.file', photo_id=photo.id, variant='preview') }}" 
               alt="{{ photo.original_filename }}" 
               @click.stop="openLightbox({{ photo.id }}, '{{ url_for('photos.file', photo_id=photo.id, variant='original') }}')">
          
          <!-- Overlay opens Side Panel -->
          <div class="overlay" @click.stop="openPanel({{ photo.id }})">
            <strong style="display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.9rem;">{{ photo.original_filename }}</strong>
            <div style="display: flex; gap: 5px; margin-top: 5px;" class="card-badges">
            </div>
          </div>
        </article>
      {% else %}
        <p class="empty" id="empty-state" style="grid-column: 1 / -1; text-align: center; padding: 3rem; background: var(--panel); border-radius: 8px; border: 1px dashed var(--line);">No photos found. Upload some to get started.</p>
      {% endfor %}
    </section>
  </main>

  <!-- Resizable Metadata Panel -->
  <aside x-show="selectedPhoto" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="transform translate-x-full"
         x-transition:enter-end="transform translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="transform translate-x-0"
         x-transition:leave-end="transform translate-x-full"
         style="width: 380px; background: var(--panel); border-left: 1px solid var(--line); display: flex; flex-direction: column; z-index: 40; flex-shrink: 0; box-shadow: var(--elevation-2);">
    
    <div style="padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line);">
      <h2 style="margin: 0; font-size: 1.1rem;">Details</h2>
      <button class="button small secondary" @click="selectedPhoto = null">&times;</button>
    </div>
    
    <div style="flex: 1; overflow-y: auto; padding: 1.5rem;" id="panel-content">
      <template x-if="panelLoading">
        <div style="text-align: center; padding: 2rem;">
          <span class="spinner" style="border-top-color: var(--accent);"></span>
        </div>
      </template>
      <template x-if="!panelLoading && selectedPhotoData">
        <form @submit.prevent="saveMetadata" class="form">
          <img :src="selectedPhotoData.previewUrl" style="width: 100%; border-radius: 6px; margin-bottom: 14px; border: 1px solid var(--line);">
          
          <label>Title
            <input type="text" x-model="selectedPhotoData.title" class="input">
          </label>
          <label>Description
            <textarea x-model="selectedPhotoData.description" class="input"></textarea>
          </label>
          <label>Tags (comma separated)
            <input type="text" x-model="selectedPhotoData.tags" class="input">
          </label>
          
            <button type="submit" class="button primary" style="flex: 1;" :disabled="isSaving" x-text="isSaving ? 'Saving...' : 'Save'"></button>
          </div>
        </form>
      </template>
    </div>
  </aside>

  <!-- Lightbox -->
  <div x-show="lightboxOpen" class="lightbox" x-transition.opacity style="display: none;">
    <div class="controls">
      <button class="lightbox-btn" @click="lightboxOpen = false" title="Close (Esc)">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <img :src="lightboxImageSrc" alt="Fullscreen Image">
  </div>
</div>

<style>
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.dashboard-layout { animation: fadeIn 0.3s ease-out; }
</style>

<script>
function galleryApp() {
  return {
    isDragging: false,
    selectedPhoto: null,
    selectedPhotoData: null,
    panelLoading: false,
    isSaving: false,
    lightboxOpen: false,
    lightboxImageSrc: '',
    csrfToken: '{{ csrf_token() }}',
    init() {
      
      // Remove display:none from lightbox once alpine loads
      document.querySelector('.lightbox').style.display = 'flex';
    },

    openLightbox(id, src) {
      this.lightboxImageSrc = src;
      this.lightboxOpen = true;
    },

    openPanel(id) {
      this.selectedPhoto = id;
      this.panelLoading = true;
      this.selectedPhotoData = null;
      
      fetch(`/api/v1/photos/${id}`)
        .then(res => res.json())
        .then(payload => {
          const data = payload.data || {};
          this.selectedPhotoData = {
            title: (data.note && data.note.title) ? data.note.title : '',
            description: (data.note && data.note.description) ? data.note.description : '',
            tags: (data.tags || []).join(', '),
            previewUrl: data.preview_url
          };
          this.panelLoading = false;
        });
    },

    saveMetadata() {
      this.isSaving = true;
      const payload = {
        title: this.selectedPhotoData.title,
        description: this.selectedPhotoData.description,
        tags: this.selectedPhotoData.tags.split(',').map(t => t.trim()).filter(t => t)
      };
      
      fetch(`/photos/api/${this.selectedPhoto}/metadata`, {
        method: 'POST',
        headers: { 'X-CSRFToken': this.csrfToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(res => res.json()).then(data => {
        this.isSaving = false;
      });
    },


    
    handleDrop(e) {
      this.isDragging = false;
      this.handleFiles(e.dataTransfer.files);
    },

    handleFiles(files) {
      if (!files.length) return;
      // In a real SPA we would append optimistic UI cards.
      // For simplicity in this iteration, we upload and refresh.
      let uploaded = 0;
      Array.from(files).forEach(file => {
        const formData = new FormData();
        formData.append('photo', file);
        
        fetch('/photos/api/upload', {
          method: 'POST',
          headers: { 'X-CSRFToken': this.csrfToken },
          body: formData
        }).then(() => {
          uploaded++;
          if (uploaded === files.length) window.location.reload();
        });
      });
    },


  }
}
</script>
{% endblock %}
