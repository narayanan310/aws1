{% extends "base.html" %}
{% block title %}Semantic Search{% endblock %}
{% block content %}
<section class="page-title"><h1>Semantic Search</h1></section>
<form class="filters" method="get">
  <input name="q" value="{{ query }}" placeholder="Show my beach photos, find receipts, sunsets, dogs">
  <button class="button" type="submit">Search</button>
</form>
<section class="photo-grid">
  {% for photo in results %}
    {% include "photos/_card.html" %}
  {% else %}
    <p class="empty">No semantic results yet. Run the embedding worker after uploads.</p>
  {% endfor %}
</section>
{% endblock %}
