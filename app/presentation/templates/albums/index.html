{% extends "base.html" %}
{% block title %}Albums{% endblock %}
{% block content %}
<section class="page-title"><h1>Albums</h1></section>
<section class="panel">
  <form method="post" class="form compact">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Name<input name="name" required></label>
    <label>Description<input name="description"></label>
    <button class="button" type="submit">Create Album</button>
  </form>
</section>
<section class="album-list">
  {% for album in albums %}
    <article class="panel"><h2>{{ album.name }}</h2><p>{{ album.description or "No description" }}</p></article>
  {% else %}
    <p class="empty">No albums yet.</p>
  {% endfor %}
</section>
{% endblock %}
